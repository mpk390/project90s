<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - Project 90's Games</title>
  <style>
    :root{--black:#050510;--neon-purple:#9B2CFF;--hot-pink:#FF1493;--cyan:#00AEEF;--yellow:#FFD400;--white:#F5F5FF;--muted:#B8A7D9;--panel:rgba(10,8,28,.82);--line:rgba(155,44,255,.55)}
    *{box-sizing:border-box;margin:0;padding:0} body{min-height:100vh;background:var(--black);color:var(--white);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:grid;place-items:center;padding:22px;background-image:radial-gradient(circle at 50% -12%,rgba(155,44,255,.42),transparent 38%),radial-gradient(circle at 8% 28%,rgba(255,20,147,.18),transparent 25%),radial-gradient(circle at 92% 22%,rgba(0,174,239,.2),transparent 25%),linear-gradient(180deg,#050510 0%,#120024 58%,#050510 100%)}
    .pixel{font-family:"Courier New",monospace;font-weight:900;letter-spacing:.5px;text-transform:uppercase}.card{width:min(520px,100%);border:1px solid var(--line);border-radius:18px;background:var(--panel);box-shadow:0 0 35px rgba(155,44,255,.25);padding:26px}.avatar{width:128px;height:128px;border-radius:22px;border:2px solid var(--line);object-fit:cover;display:block;margin:0 auto 18px;background:#120024}h1{text-align:center;color:var(--yellow);font-size:25px;margin-bottom:18px}.row{border-bottom:1px solid rgba(155,44,255,.3);padding:12px 0}.row b{display:block;color:var(--cyan);font-size:13px}.row span{font-size:16px}.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:18px}button,a{flex:1;min-height:44px;border-radius:10px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;text-decoration:none;font-weight:900;color:var(--white);background:rgba(255,255,255,.06);cursor:pointer}.primary{background:var(--yellow);color:#170b21;border-color:var(--yellow)}input{width:100%;margin-top:16px;color:var(--white)}.msg{margin-top:12px;text-align:center;color:var(--yellow);min-height:22px}
  </style>
</head>
<body>
  <main class="card">
    <img id="profileImage" class="avatar" src="project90-logo.png" alt="Profile image">
    <h1 class="pixel">My Profile</h1>

    <div class="row"><b>Name</b><span id="name">Loading...</span></div>
    <div class="row"><b>Email</b><span id="email">Loading...</span></div>
    <div class="row"><b>User ID</b><span id="userId">Loading...</span></div>
    <div class="row"><b>Firebase UID</b><span id="uid">Loading...</span></div>

    <input id="photo" type="file" accept="image/*">
    <button id="uploadBtn" class="primary pixel" type="button">Update Profile Image</button>

    <div class="actions">
      <a href="index.html">Home</a>
      <button id="logoutBtn" type="button">Logout</button>
    </div>
    <div id="message" class="msg"></div>
  </main>

  <script type="module">
    import { auth, db, storage } from "./firebase-config.js";
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
    import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-storage.js";

    let currentUser = null;
    const msg = document.getElementById("message");

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        location.href = "login.html";
        return;
      }
      currentUser = user;
      const profileSnap = await getDoc(doc(db, "profiles", user.uid));
      if (!profileSnap.exists()) {
        location.href = "profile-setup.html";
        return;
      }
      const profile = profileSnap.data();
      document.getElementById("name").textContent = profile.name || "";
      document.getElementById("email").textContent = profile.email || user.email || "";
      document.getElementById("userId").textContent = profile.userId || "";
      document.getElementById("uid").textContent = user.uid;
      if (profile.photoURL) document.getElementById("profileImage").src = profile.photoURL;
    });

    document.getElementById("uploadBtn").addEventListener("click", async () => {
      const file = document.getElementById("photo").files[0];
      if (!file || !currentUser) {
        msg.textContent = "Choose an image first.";
        return;
      }
      try {
        msg.textContent = "Uploading...";
        const imageRef = ref(storage, `profile-images/${currentUser.uid}/${Date.now()}-${file.name}`);
        await uploadBytes(imageRef, file);
        const photoURL = await getDownloadURL(imageRef);
        await updateDoc(doc(db, "profiles", currentUser.uid), { photoURL, updatedAt: serverTimestamp() });
        document.getElementById("profileImage").src = photoURL;
        msg.textContent = "Profile image updated.";
      } catch (error) {
        msg.textContent = error.message;
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      location.href = "login.html";
    });
  </script>
</body>
</html>
