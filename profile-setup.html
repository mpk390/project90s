<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Profile - Project 90's Games</title>
  <style>
    :root{--black:#050510;--neon-purple:#9B2CFF;--hot-pink:#FF1493;--cyan:#00AEEF;--yellow:#FFD400;--white:#F5F5FF;--muted:#B8A7D9;--panel:rgba(10,8,28,.82);--line:rgba(155,44,255,.55)}
    *{box-sizing:border-box;margin:0;padding:0} body{min-height:100vh;background:var(--black);color:var(--white);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:grid;place-items:center;padding:22px;background-image:radial-gradient(circle at 50% -12%,rgba(155,44,255,.42),transparent 38%),radial-gradient(circle at 8% 28%,rgba(255,20,147,.18),transparent 25%),radial-gradient(circle at 92% 22%,rgba(0,174,239,.2),transparent 25%),linear-gradient(180deg,#050510 0%,#120024 58%,#050510 100%)}
    .pixel{font-family:"Courier New",monospace;font-weight:900;letter-spacing:.5px;text-transform:uppercase}.card{width:min(460px,100%);border:1px solid var(--line);border-radius:18px;background:var(--panel);box-shadow:0 0 35px rgba(155,44,255,.25);padding:26px}.logo{display:block;width:min(260px,100%);margin:0 auto 20px}h1{text-align:center;color:var(--yellow);font-size:25px;margin-bottom:8px}p{text-align:center;color:var(--muted);margin-bottom:20px}label{display:block;margin:13px 0 6px;font-weight:800}input{width:100%;height:46px;border:1px solid var(--line);border-radius:10px;background:rgba(5,5,16,.82);color:var(--white);padding:0 14px;font-size:15px;outline:none}input:focus{border-color:var(--cyan);box-shadow:0 0 14px rgba(0,174,239,.35)}button{width:100%;min-height:46px;border-radius:10px;border:1px solid var(--yellow);background:var(--yellow);color:#170b21;font-weight:1000;cursor:pointer;margin-top:16px}.msg{margin-top:14px;text-align:center;color:var(--yellow);min-height:22px}.hint{font-size:13px;color:var(--muted);margin-top:5px}
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="project90-logo.png" alt="Project 90's Games logo">
    <h1 class="pixel">Create Profile</h1>
    <p>Choose your public name and unique user ID.</p>

    <form id="profileForm">
      <label for="name">Name</label>
      <input id="name" type="text" required maxlength="40" autocomplete="name">

      <label for="userId">Unique User ID</label>
      <input id="userId" type="text" required minlength="3" maxlength="20" placeholder="example: retroking90">
      <div class="hint">Only letters, numbers, underscore, and dot. This cannot be changed here.</div>

      <label for="photo">Profile Image</label>
      <input id="photo" type="file" accept="image/*">

      <button class="pixel" type="submit">Save Profile</button>
    </form>
    <div id="message" class="msg"></div>
  </main>

  <script type="module">
    import { auth, db, storage } from "./firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
    import { doc, runTransaction, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
    import { ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-storage.js";

    let currentUser = null;
    const msg = document.getElementById("message");
    const nameInput = document.getElementById("name");

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        location.href = "login.html";
        return;
      }
      currentUser = user;
      nameInput.value = user.displayName || "";
    });

    function cleanUserId(value) {
      return value.trim().toLowerCase();
    }

    document.getElementById("profileForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!currentUser) return;
      msg.textContent = "Saving...";

      const name = nameInput.value.trim();
      const userId = cleanUserId(document.getElementById("userId").value);
      const photoFile = document.getElementById("photo").files[0];

      if (!/^[a-z0-9_.]{3,20}$/.test(userId)) {
        msg.textContent = "User ID must be 3-20 characters: letters, numbers, underscore, or dot only.";
        return;
      }

      try {
        let photoURL = currentUser.photoURL || "";
        if (photoFile) {
          const imageRef = ref(storage, `profile-images/${currentUser.uid}/${Date.now()}-${photoFile.name}`);
          await uploadBytes(imageRef, photoFile);
          photoURL = await getDownloadURL(imageRef);
        }

        await runTransaction(db, async (transaction) => {
          const usernameRef = doc(db, "usernames", userId);
          const profileRef = doc(db, "profiles", currentUser.uid);
          const usernameSnap = await transaction.get(usernameRef);

          if (usernameSnap.exists()) {
            throw new Error("This User ID is already taken. Try another one.");
          }

          transaction.set(usernameRef, {
            uid: currentUser.uid,
            userId,
            createdAt: serverTimestamp()
          });

          transaction.set(profileRef, {
            uid: currentUser.uid,
            userId,
            name,
            email: currentUser.email || "",
            photoURL,
            createdAt: serverTimestamp(),
            updatedAt: serverTimestamp()
          });
        });

        location.href = "profile.html";
      } catch (error) {
        msg.textContent = error.message;
      }
    });
  </script>
</body>
</html>
